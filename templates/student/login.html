{% extends "base.html" %}
{% block title %}Login — TECH Skills Development{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <div class="auth-symbol">
                    <div class="tsd-logo">
                        <span class="tsd-text">TSD</span>
                    </div>
                </div>
                <div>
                    <h1 class="auth-title">TECH Skills Development</h1>
                    <p class="auth-subtitle">Empowering Future Tech Leaders</p>
                </div>
            </div>
        </div>
        <form method="post" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="auth-btn">Sign In</button>
        </form>
        <div class="auth-links">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
            <p><a href="{{ url_for('admin_login') }}">Admin Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
