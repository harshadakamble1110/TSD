{% extends "base.html" %}
{% block title %}Customer Service — TECH Skills Development{% endblock %}
{% block content %}
<div class="form-card" style="max-width: 600px; margin: 0 auto;">
    <h1 class="page-title">Customer Service</h1>
    <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Have a complaint or issue? We're here to help. Fill out the form below and we'll get back to you soon.</p>
    <form method="post" action="{{ url_for('complaint') }}">
        <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" value="{{ current_user.full_name if current_user.is_authenticated else '' }}" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ current_user.email if current_user.is_authenticated else '' }}" required>
        </div>
        <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="Brief description of your issue" required>
        </div>
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" placeholder="Describe your complaint or issue in detail..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit Complaint</button>
    </form>
</div>
{% endblock %}
