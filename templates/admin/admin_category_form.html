{% extends "base.html" %}
{% block title %}{{ 'Edit' if category else 'Add' }} Category — Admin{% endblock %}
{% block content %}
<nav class="breadcrumb"><a href="{{ url_for('admin_dashboard') }}">Dashboard</a> / <a href="{{ url_for('admin_categories') }}">Categories</a> / {{ 'Edit' if category else 'Add' }}</nav>
<h1 class="page-title">{{ 'Edit' if category else 'Add' }} Category</h1>
<div class="form-card" style="max-width: 500px;">
    <form method="post" action="{{ url_for('admin_category_edit', cat_id=category.id) if category else url_for('admin_category_add') }}">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="{{ category.name if category else '' }}" required>
        </div>
        <div class="form-group">
            <label for="slug">Slug</label>
            <input type="text" id="slug" name="slug" value="{{ category.slug if category else '' }}" placeholder="auto from name">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{ category.description if category else '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="icon">Icon (emoji or text)</label>
            <input type="text" id="icon" name="icon" value="{{ category.icon if category else '' }}" placeholder="e.g. 📚">
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('admin_categories') }}" class="btn btn-secondary" style="margin-left: 0.5rem;">Cancel</a>
    </form>
</div>
{% endblock %}
