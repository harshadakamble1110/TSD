<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — TECH Skills Development</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="auth-symbol">
                        <div class="tsd-logo">
                            <div class="logo-icon">
                                <i class="fas fa-graduation-cap"></i>
                            </div>
                            <div class="logo-text">
                                <span class="tsd-text">TSD</span>
                                <span class="tsd-full">TECH Skills</span>
                            </div>
                        </div>
                    </div>
                    <div>
                        <h1 class="auth-title">Admin Portal</h1>
                        <p class="auth-subtitle">TECH Skills Development</p>
                    </div>
                </div>
            </div>
            <form method="post" action="{{ url_for('admin_login') }}" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter admin username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter admin password">
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>
            <div class="auth-links">
                <p><a href="{{ url_for('login') }}">Student Login</a></p>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/advanced-ui.js') }}"></script>
</body>
</html>
