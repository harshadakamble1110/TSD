{% extends "base.html" %}
{% block title %}Courses — Admin{% endblock %}
{% block content %}
<nav class="breadcrumb"><a href="{{ url_for('admin_dashboard') }}">Dashboard</a> / Courses</nav>
<h1 class="page-title">Courses</h1>
<p>
    <a href="{{ url_for('admin_course_add') }}" class="btn btn-primary">Add Course</a>
    <form method="get" action="{{ url_for('admin_courses') }}" style="display: inline; margin-left: 1rem;">
        <label>Category:</label>
        <select name="category_id" onchange="this.form.submit()">
            <option value="">All</option>
            {% for c in categories %}
            <option value="{{ c.id }}" {% if selected_category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
        </select>
    </form>
</p>
<div class="admin-table-wrap" style="margin-top: 1rem;">
    <table class="admin-table">
        <thead>
            <tr>
                <th>Course</th>
                <th>Category</th>
                <th>Duration</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for co in courses %}
            <tr>
                <td>{{ co.name }}</td>
                <td>{{ co.category.name }}</td>
                <td>{{ co.duration_weeks }} hours</td>
                <td>
                    <a href="{{ url_for('admin_course_edit', course_id=co.id) }}" class="btn btn-secondary" style="padding: 0.3rem 0.6rem; font-size: 0.85rem;">Edit</a>
                    <form method="post" action="{{ url_for('admin_course_delete', course_id=co.id) }}" style="display: inline;">
                        <button type="submit" class="btn btn-secondary" style="padding: 0.3rem 0.6rem; font-size: 0.85rem;" onclick="return confirm('Delete this course?');">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
