{% extends "base.html" %}
{% block title %}Topics — Manage Content{% endblock %}
{% block content %}
<nav class="breadcrumb"><a href="{{ url_for('admin_dashboard') }}">Dashboard</a> / <a href="{{ url_for('admin_manage_content') }}">Manage Content</a> / Topics</nav>
<h1 class="page-title">Select Category</h1>
<p style="color: var(--text-muted); margin-bottom: 1.5rem;">Category then Course then Topics.</p>
<div class="categories-grid">
    {% for cat in categories %}
    <a href="{{ url_for('admin_manage_topics_courses', cat_id=cat.id) }}" class="category-card">
        <div class="icon">{{ cat.icon or '📚' }}</div>
        <h3>{{ cat.name }}</h3>
    </a>
    {% endfor %}
</div>
{% endblock %}
